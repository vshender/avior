[project]
name = "avior"
version = "0.0.1.dev0"
description = "A Python library for building LLM agents."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "ISC" }
authors = [
    { name = "Vadzim Shender", email = "vadzim@shender.org" },
]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/avior"]

[dependency-groups]
dev = [
    "basedpyright>=1.39",
    "mypy>=1.20",
    "ruff>=0.15",
]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.basedpyright]
include = ["src"]
pythonVersion = "3.12"
typeCheckingMode = "strict"

[tool.mypy]
files = ["src"]
python_version = "3.12"
strict = true
