name: Publish

on:
  release:
    types: [published]

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/avior/
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: "0.11.19"

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl python -c "from avior.core import Agent"

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz python -c "from avior.core import Agent"

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
